<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Physics Unit Tests — Fractional Aiming</title></head>
<body style="background:#0a0e18;color:#e0e6f0;font-family:monospace;padding:20px;">
<pre id="output"></pre>
<script src="physics.js"></script>
<script>
const log = [];
let totalTests = 0;
function assert(name, cond, msg) {
    totalTests++;
    if (cond) {
        log.push(`✅ PASS: ${name}`);
    } else {
        log.push(`❌ FAIL: ${name} — ${msg}`);
    }
}
function approx(a, b, eps) { return Math.abs(a - b) < (eps || 0.01); }
function approxV(a, b, eps) { return approx(a.x, b.x, eps) && approx(a.y, b.y, eps); }

// ====== Constants ======
const BR = 1.125;
const TW = 100, TH = 50;

// ====== Utility functions ======
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function normalize(v) {
    const d = Math.sqrt(v.x * v.x + v.y * v.y);
    return d < 1e-9 ? {x:0,y:0} : {x: v.x/d, y: v.y/d};
}

// Use physics module for geometry calculations
const P = BilliardPhysics;
const U = P._util;

function calcGeometry(cb, ob, pocket, tipHeight, tipSide, shotSpeed) {
    return P.calcFullGeometry(cb, ob, pocket, {
        tipHeight: tipHeight || 0,
        tipSide: tipSide || 0,
        shotSpeed: shotSpeed != null ? shotSpeed : 0.5,
        cueElevation: 0,
        shaftType: 'ld',
    });
}

// ============================================================
//               SECTION 1: CORE GEOMETRY (backward compat)
// ============================================================
log.push('═══════════════════════════════');
log.push(' SECTION 1: CORE GEOMETRY');
log.push('═══════════════════════════════');

// TEST 1: Full ball hit (0° cut)
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 }, cb = { x: 20, y: 25 };
    const g = calcGeometry(cb, ob, pocket);
    assert('Full ball: cut angle ≈ 0°', approx(g.cutAngleDeg, 0, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('Full ball: fraction ≈ 1.0', approx(g.fraction, 1.0, 0.02), `got ${g.fraction.toFixed(4)}`);
    assert('Full ball: ghost ball x', approx(g.ghostBall.x, 50 - 2*BR, 0.01), `got ${g.ghostBall.x}`);
    assert('Full ball: ghost ball y = OB y', approx(g.ghostBall.y, 25, 0.01), `got ${g.ghostBall.y}`);
}

// TEST 2: Half ball hit (30° cut)
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 };
    const dist = 30, theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('Half ball: cut angle ≈ 30°', approx(g.cutAngleDeg, 30, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('Half ball: fraction ≈ 0.5', approx(g.fraction, 0.5, 0.02), `got ${g.fraction.toFixed(4)}`);
}

// TEST 3: 3/4 ball hit
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30, theta = Math.asin(0.25);
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('3/4 ball: cut angle ≈ 14.48°', approx(g.cutAngleDeg, 14.48, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('3/4 ball: fraction ≈ 0.75', approx(g.fraction, 0.75, 0.02), `got ${g.fraction.toFixed(4)}`);
}

// TEST 4: 1/4 ball hit
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30, theta = Math.asin(0.75);
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('1/4 ball: cut angle ≈ 48.59°', approx(g.cutAngleDeg, 48.59, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('1/4 ball: fraction ≈ 0.25', approx(g.fraction, 0.25, 0.02), `got ${g.fraction.toFixed(4)}`);
}

// TEST 5: 1/8 ball hit
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30, theta = Math.asin(0.875);
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('1/8 ball: cut angle ≈ 61.04°', approx(g.cutAngleDeg, 61.04, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('1/8 ball: fraction ≈ 0.125', approx(g.fraction, 0.125, 0.02), `got ${g.fraction.toFixed(4)}`);
}

// TEST 6: Ghost ball position with angled pocket
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 0 };
    const dpx = pocket.x-ob.x, dpy = pocket.y-ob.y;
    const dpLen = Math.sqrt(dpx*dpx+dpy*dpy);
    const dp = {x:dpx/dpLen,y:dpy/dpLen};
    const expectedGB = { x: ob.x - dp.x*2*BR, y: ob.y - dp.y*2*BR };
    const g = calcGeometry({x:20,y:30}, ob, pocket);
    assert('Angled pocket: ghost ball x', approx(g.ghostBall.x, expectedGB.x, 0.01), `expected ${expectedGB.x.toFixed(3)}, got ${g.ghostBall.x.toFixed(3)}`);
    assert('Angled pocket: ghost ball y', approx(g.ghostBall.y, expectedGB.y, 0.01), `expected ${expectedGB.y.toFixed(3)}, got ${g.ghostBall.y.toFixed(3)}`);
}

// TEST 7: Contact point
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 }, cb = { x: 20, y: 25 };
    const g = calcGeometry(cb, ob, pocket);
    assert('Contact point x', approx(g.contactPoint.x, 50 - BR, 0.01), `expected ${50-BR}, got ${g.contactPoint.x}`);
    assert('Contact point y', approx(g.contactPoint.y, 25, 0.01), `expected 25, got ${g.contactPoint.y}`);
    const dGC = Math.sqrt((g.contactPoint.x-g.ghostBall.x)**2+(g.contactPoint.y-g.ghostBall.y)**2);
    const dOC = Math.sqrt((g.contactPoint.x-ob.x)**2+(g.contactPoint.y-ob.y)**2);
    assert('Contact is BR from ghost', approx(dGC, BR, 0.01), `got ${dGC.toFixed(4)}`);
    assert('Contact is BR from OB', approx(dOC, BR, 0.01), `got ${dOC.toFixed(4)}`);
}

// TEST 8: Fraction formula identity
{
    [1, 0.75, 0.5, 0.25, 0.125].forEach(f => {
        const theta = Math.asin(1 - f);
        const recovered = 1 - Math.sin(theta);
        assert(`Fraction identity f=${f}`, approx(recovered, f, 1e-10), `recovered ${recovered}`);
    });
}

// ============================================================
//       SECTION 2: STUN DIRECTION (tangent line)
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 2: STUN DIRECTION');
log.push('═══════════════════════════════');

// TEST: stunDir ⊥ dirPocket (always)
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    const dotSP = g.stunDir.x * g.dirPocket.x + g.stunDir.y * g.dirPocket.y;
    assert('stunDir ⊥ dirPocket', approx(dotSP, 0, 0.001), `dot = ${dotSP.toFixed(6)}`);
}

// TEST: stunDir is unit vector
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 45 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    const len = Math.sqrt(g.stunDir.x**2 + g.stunDir.y**2);
    assert('stunDir is unit vector', approx(len, 1, 0.001), `|stunDir| = ${len.toFixed(6)}`);
}

// TEST: stunDir = deflDir when tipHeight = 0
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket, 0);
    assert('tipHeight=0: deflDir ≈ stunDir', approxV(g.deflDir, g.stunDir, 0.001),
        `deflDir=(${g.deflDir.x.toFixed(4)},${g.deflDir.y.toFixed(4)}) stunDir=(${g.stunDir.x.toFixed(4)},${g.stunDir.y.toFixed(4)})`);
    assert('tipHeight=0: deflAngle = 90°', approx(g.deflAngleDeg, 90, 0.1), `got ${g.deflAngleDeg.toFixed(2)}°`);
}

// ============================================================
//    SECTION 3: TIP-HEIGHT DEFLECTION (follow/draw)
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 3: TIP-HEIGHT DEFLECTION');
log.push('═══════════════════════════════');

function setupTipTest(cutDeg) {
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = cutDeg * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    return { cb, ob, pocket };
}

// TEST: Follow (tipHeight=1) → deflAngle ≈ cutAngle
{
    const s = setupTipTest(30);
    const g = calcGeometry(s.cb, s.ob, s.pocket, 1);
    assert('Follow max: deflAngle ≈ cutAngle (30°)', approx(g.deflAngleDeg, 30, 0.5),
        `got ${g.deflAngleDeg.toFixed(2)}°`);
}

// TEST: Draw (tipHeight=-1) → deflAngle ≈ 180° - cutAngle
{
    const s = setupTipTest(30);
    const g = calcGeometry(s.cb, s.ob, s.pocket, -1);
    assert('Draw max: deflAngle ≈ 150° (= 180-30)', approx(g.deflAngleDeg, 150, 0.5),
        `got ${g.deflAngleDeg.toFixed(2)}°`);
}

// TEST: Half follow (tipHeight=0.5) → deflAngle ≈ 60°
{
    const s = setupTipTest(30);
    const g = calcGeometry(s.cb, s.ob, s.pocket, 0.5);
    assert('Half follow: deflAngle ≈ 60°', approx(g.deflAngleDeg, 60, 0.5),
        `got ${g.deflAngleDeg.toFixed(2)}°`);
}

// TEST: deflDir is unit vector for all tip heights
{
    [-1, -0.5, 0, 0.5, 1].forEach(tip => {
        const s = setupTipTest(30);
        const g = calcGeometry(s.cb, s.ob, s.pocket, tip);
        const len = Math.sqrt(g.deflDir.x**2 + g.deflDir.y**2);
        assert(`deflDir unit at tip=${tip}`, approx(len, 1, 0.01), `|deflDir| = ${len.toFixed(6)}`);
    });
}

// TEST: Phi formula consistency
{
    const angles = [0, 15, 30, 45, 60];
    const tips = [-1, -0.5, 0, 0.5, 1];
    let phiOk = true;
    angles.forEach(aDeg => {
        tips.forEach(tip => {
            const expected = 90 - tip * (90 - aDeg);
            const s = setupTipTest(aDeg);
            const g = calcGeometry(s.cb, s.ob, s.pocket, tip);
            if (!approx(g.deflAngleDeg, expected, 1)) {
                phiOk = false;
                log.push(`  φ mismatch: θ=${aDeg}°, tip=${tip}, expected=${expected.toFixed(1)}°, got=${g.deflAngleDeg.toFixed(1)}°`);
            }
        });
    });
    assert('Phi formula: φ = 90° − tip × (90° − θ) for all combos', phiOk, 'see details above');
}

// ============================================================
//           SECTION 4: rayToRail
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 4: RAY TO RAIL');
log.push('═══════════════════════════════');

{
    const pt = U.rayToRail(50, 25, 1, 0, TW, TH);
    assert('Ray right: hits x=100', approx(pt.x, 100, 0.01), `x = ${pt.x}`);
    assert('Ray right: y unchanged', approx(pt.y, 25, 0.01), `y = ${pt.y}`);
}
{
    const pt = U.rayToRail(50, 25, -1, 0, TW, TH);
    assert('Ray left: hits x=0', approx(pt.x, 0, 0.01), `x = ${pt.x}`);
}
{
    const pt = U.rayToRail(50, 25, 0, -1, TW, TH);
    assert('Ray up: hits y=0', approx(pt.y, 0, 0.01), `y = ${pt.y}`);
}
{
    const pt = U.rayToRail(50, 25, 0, 1, TW, TH);
    assert('Ray down: hits y=50', approx(pt.y, 50, 0.01), `y = ${pt.y}`);
}
{
    const d = Math.SQRT1_2;
    const pt = U.rayToRail(50, 25, d, d, TW, TH);
    assert('Diagonal: hits bottom rail first', approx(pt.y, 50, 0.01), `y = ${pt.y.toFixed(2)}`);
    assert('Diagonal: x ≈ 75', approx(pt.x, 75, 0.01), `x = ${pt.x.toFixed(2)}`);
}

// ============================================================
//           SECTION 5: EDGE CASES
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 5: EDGE CASES');
log.push('═══════════════════════════════');

// Diagonal pocket + half ball cut
{
    const ob = { x: 60, y: 30 }, pocket = { x: 100, y: 0 };
    const dpx = pocket.x-ob.x, dpy = pocket.y-ob.y;
    const dpLen = Math.sqrt(dpx*dpx+dpy*dpy);
    const dp = {x:dpx/dpLen,y:dpy/dpLen};
    const gb = { x: ob.x - dp.x*2*BR, y: ob.y - dp.y*2*BR };
    const theta = 30 * Math.PI / 180;
    const cosT = Math.cos(theta), sinT = Math.sin(theta);
    const aimDir = { x: dp.x*cosT - dp.y*sinT, y: dp.x*sinT + dp.y*cosT };
    const cb = { x: gb.x - aimDir.x*25, y: gb.y - aimDir.y*25 };
    const g = calcGeometry(cb, ob, pocket);
    assert('Diagonal: cut ≈ 30°', approx(g.cutAngleDeg, 30, 0.5), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('Diagonal: fraction ≈ 0.5', approx(g.fraction, 0.5, 0.02), `got ${g.fraction.toFixed(4)}`);
}

// Very thin cut
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 85 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('Thin cut: angle ≈ 85°', approx(g.cutAngleDeg, 85, 1), `got ${g.cutAngleDeg.toFixed(2)}°`);
    assert('Thin cut: fraction near 0', g.fraction < 0.1, `got ${g.fraction.toFixed(4)}`);
}

// ============================================================
//           SECTION 6: THROW EFFECT
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 6: THROW EFFECT');
log.push('═══════════════════════════════');

// CIT at 30° cut with μ=0.06 → throw ≈ 1.7° (Dr. Dave reference)
{
    const cutAngle = 30 * Math.PI / 180;
    const speed = P.normToSpeed(0.5); // medium speed
    const throwAngle = P.calcCutInducedThrow(cutAngle, speed);
    const throwDeg = throwAngle * 180 / Math.PI;
    assert('CIT at 30° ≈ 1.5-2.0°', throwDeg > 0.8 && throwDeg < 3.0,
        `got ${throwDeg.toFixed(2)}°`);
}

// CIT at 0° = 0 (straight shot, no throw)
{
    const throwAngle = P.calcCutInducedThrow(0, P.normToSpeed(0.5));
    assert('CIT at 0° = 0°', Math.abs(throwAngle) < 0.001,
        `got ${(throwAngle * 180 / Math.PI).toFixed(4)}°`);
}

// CIT near 90° ≈ 0 (near miss)
{
    const throwAngle = P.calcCutInducedThrow(Math.PI * 0.49, P.normToSpeed(0.5));
    assert('CIT near 90° ≈ 0°', Math.abs(throwAngle) < 0.001,
        `got ${(throwAngle * 180 / Math.PI).toFixed(4)}°`);
}

// CIT peaks near 30-35° cut
{
    let maxThrow = 0, maxAngle = 0;
    for (let deg = 5; deg < 85; deg += 5) {
        const t = P.calcCutInducedThrow(deg * Math.PI / 180, P.normToSpeed(0.5));
        if (t > maxThrow) { maxThrow = t; maxAngle = deg; }
    }
    assert('CIT max near 30-40° cut', maxAngle >= 25 && maxAngle <= 45,
        `max at ${maxAngle}°`);
}

// Slower shot → more throw
{
    const cutAngle = 30 * Math.PI / 180;
    const throwSlow = P.calcCutInducedThrow(cutAngle, P.normToSpeed(0.15)); // soft
    const throwFast = P.calcCutInducedThrow(cutAngle, P.normToSpeed(0.85)); // hard
    assert('Slower = more throw', throwSlow > throwFast,
        `slow=${(throwSlow*180/Math.PI).toFixed(2)}° fast=${(throwFast*180/Math.PI).toFixed(2)}°`);
}

// SIT: Left English → OB thrown right (positive)
{
    const sidespin = -100; // left English = negative sidespin
    const speed = P.normToSpeed(0.5);
    const sitAngle = P.calcSpinInducedThrow(sidespin, speed);
    assert('SIT: Left English → throw right (>0)', sitAngle > 0,
        `got ${(sitAngle*180/Math.PI).toFixed(2)}°`);
}

// SIT: Right English → OB thrown left (negative)
{
    const sidespin = 100; // right English = positive sidespin
    const speed = P.normToSpeed(0.5);
    const sitAngle = P.calcSpinInducedThrow(sidespin, speed);
    assert('SIT: Right English → throw left (<0)', sitAngle < 0,
        `got ${(sitAngle*180/Math.PI).toFixed(2)}°`);
}

// SIT: No English → no throw
{
    const sitAngle = P.calcSpinInducedThrow(0, P.normToSpeed(0.5));
    assert('SIT: No English → 0°', Math.abs(sitAngle) < 0.001,
        `got ${(sitAngle*180/Math.PI).toFixed(4)}°`);
}

// Full geometry includes throw
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket, 0, 0, 0.5);
    assert('Full geom has throwAngleDeg', g.throwAngleDeg != null, 'missing throwAngleDeg');
    assert('Full geom has dirPocketThrown', g.dirPocketThrown != null, 'missing dirPocketThrown');
    assert('Thrown dir ≠ ideal dir', !approxV(g.dirPocket, g.dirPocketThrown, 0.0001),
        'should differ due to throw');
}

// ============================================================
//           SECTION 7: SQUIRT + SWERVE
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 7: SQUIRT + SWERVE');
log.push('═══════════════════════════════');

// Squirt: Left English → CB squirts right of aim (positive angle)
{
    const squirt = P.calcSquirtAngle(-1, 'ld'); // full left English
    const squirtDeg = squirt * 180 / Math.PI;
    assert('Left English → squirt right (>0)', squirt > 0,
        `got ${squirtDeg.toFixed(2)}°`);
    assert('LD squirt ≈ 0.5°', approx(Math.abs(squirtDeg), 0.5, 0.1),
        `got ${Math.abs(squirtDeg).toFixed(2)}°`);
}

// Squirt: Right English → CB squirts left (negative angle)
{
    const squirt = P.calcSquirtAngle(1, 'ld');
    assert('Right English → squirt left (<0)', squirt < 0,
        `got ${(squirt*180/Math.PI).toFixed(2)}°`);
}

// Squirt: No English → no squirt
{
    const squirt = P.calcSquirtAngle(0, 'ld');
    assert('No English → 0° squirt', Math.abs(squirt) < 0.001,
        `got ${(squirt*180/Math.PI).toFixed(4)}°`);
}

// Standard shaft squirts more than LD
{
    const squirtLD = P.calcSquirtAngle(-1, 'ld');
    const squirtSTD = P.calcSquirtAngle(-1, 'std');
    assert('Standard > LD squirt', Math.abs(squirtSTD) > Math.abs(squirtLD),
        `LD=${(squirtLD*180/Math.PI).toFixed(2)}° STD=${(squirtSTD*180/Math.PI).toFixed(2)}°`);
}

// Full geometry includes squirt data
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 }, cb = { x: 20, y: 28 };
    const g = P.calcFullGeometry(cb, ob, pocket, { tipSide: -0.5, shotSpeed: 0.5 });
    assert('Full geom has squirtAngleDeg', g.squirtAngleDeg != null, 'missing');
    assert('Full geom has dirAimSquirted', g.dirAimSquirted != null, 'missing');
    assert('Squirted dir ≠ aim dir', !approxV(g.dirAim, g.dirAimSquirted, 0.0001),
        'should differ');
}

// Swerve: no cue elevation → straight path
{
    const aimDir = { x: 1, y: 0 };
    const swerve = P.calcSwervePath({x:10,y:25}, aimDir, 0.01, -100, 0, 80, 40);
    assert('No elevation → straight path', swerve.isStraight, 'expected straight');
}

// Swerve: with elevation + English → curved path
{
    const aimDir = { x: 1, y: 0 };
    const swerve = P.calcSwervePath({x:10,y:25}, aimDir, 0.01, -100, 15, 80, 40);
    assert('Elevated + English → curved', !swerve.isStraight, 'expected curve');
    assert('Swerve has multiple points', swerve.points.length > 2,
        `got ${swerve.points.length} points`);
}

// ============================================================
//           SECTION 8: ROLLING/SLIDING
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 8: ROLLING/SLIDING');
log.push('═══════════════════════════════');

// Stop position within table bounds
{
    const result = P.predictStopPosition({x:50,y:25}, {x:1,y:0}, 80);
    assert('CB stop x within table', result.stopPos.x >= BR && result.stopPos.x <= TW - BR,
        `x = ${result.stopPos.x.toFixed(1)}`);
    assert('CB stop y within table', result.stopPos.y >= BR && result.stopPos.y <= TH - BR,
        `y = ${result.stopPos.y.toFixed(1)}`);
}

// Faster speed → longer distance
{
    const r1 = P.predictStopPosition({x:50,y:25}, {x:1,y:0}, 40);
    const r2 = P.predictStopPosition({x:50,y:25}, {x:1,y:0}, 100);
    assert('Faster = farther stop', r2.totalDistance > r1.totalDistance,
        `slow=${r1.totalDistance.toFixed(1)} fast=${r2.totalDistance.toFixed(1)}`);
}

// Slide distance > 0
{
    const r = P.predictStopPosition({x:50,y:25}, {x:1,y:0}, 80);
    assert('Slide distance > 0', r.slideDistance > 0, `got ${r.slideDistance.toFixed(2)}`);
    assert('Roll distance > 0', r.rollDistance > 0, `got ${r.rollDistance.toFixed(2)}`);
}

// Full geometry includes predicted stops
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('Full geom has cbStopPos', g.cbStopPos != null, 'missing cbStopPos');
    assert('Full geom has obStopPos', g.obStopPos != null, 'missing obStopPos');
}

// ============================================================
//           SECTION 9: CUSHION REBOUND
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 9: CUSHION REBOUND');
log.push('═══════════════════════════════');

// Normal COR applied on left rail
{
    const result = P.calcCushionRebound(
        {x: 0, y: 25}, // hit left rail
        {x: -50, y: 30}, // incoming velocity
        0 // no spin
    );
    assert('Cushion: vx reversed (left rail)', result.velocity.x > 0,
        `vx = ${result.velocity.x.toFixed(2)}`);
    assert('Cushion: vy same sign', result.velocity.y > 0,
        `vy = ${result.velocity.y.toFixed(2)}`);
}

// COR reduces normal speed
{
    const result = P.calcCushionRebound(
        {x: 0, y: 25},
        {x: -100, y: 0}, // straight into left rail
        0
    );
    assert('Cushion: |vx out| < |vx in|', Math.abs(result.velocity.x) < 100,
        `|vx out| = ${Math.abs(result.velocity.x).toFixed(2)}`);
    const e = P.CONST.COR_CUSHION;
    assert('Cushion: vx ≈ e × vx_in', approx(result.velocity.x, e * 100, 2),
        `expected ${(e*100).toFixed(1)}, got ${result.velocity.x.toFixed(1)}`);
}

// Spin effect on rebound
{
    const noSpin = P.calcCushionRebound({x: 0, y: 25}, {x: -50, y: 50}, 0);
    const withSpin = P.calcCushionRebound({x: 0, y: 25}, {x: -50, y: 50}, 200);
    // With spin, the rebound should differ from no spin
    const diff = Math.abs(withSpin.velocity.y - noSpin.velocity.y);
    assert('Cushion: spin modifies rebound', diff > 0.1,
        `diff = ${diff.toFixed(2)}`);
}

// Sidespin reduced after cushion contact
{
    const result = P.calcCushionRebound({x: 0, y: 25}, {x: -50, y: 30}, 200);
    assert('Cushion: spin reduced', Math.abs(result.sidespin) < 200,
        `spin = ${Math.abs(result.sidespin).toFixed(1)}`);
}

// Multi-bounce path has multiple points
{
    const path = P.calcMultiBouncePath({x:50,y:25}, {x:0.7,y:0.7}, 100, 0, 3);
    assert('Multi-bounce: > 2 points', path.length > 2,
        `got ${path.length} points`);
    // All points within table bounds
    let allInBounds = true;
    path.forEach(p => {
        if (p.x < -0.5 || p.x > TW + 0.5 || p.y < -0.5 || p.y > TH + 0.5)
            allInBounds = false;
    });
    assert('Multi-bounce: all within bounds', allInBounds, 'out of bounds detected');
}

// Full geometry includes bounce path
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const gb = { x: 50 - 2*BR, y: 25 }, dist = 30;
    const theta = 30 * Math.PI / 180;
    const cb = { x: gb.x - Math.cos(theta)*dist, y: gb.y + Math.sin(theta)*dist };
    const g = calcGeometry(cb, ob, pocket);
    assert('Full geom has cbBouncePath', g.cbBouncePath != null && g.cbBouncePath.length >= 1,
        `got ${g.cbBouncePath ? g.cbBouncePath.length : 'null'}`);
}

// ============================================================
//           SECTION 10: INTEGRATION CHECKS
// ============================================================
log.push('');
log.push('═══════════════════════════════');
log.push(' SECTION 10: INTEGRATION');
log.push('═══════════════════════════════');

// calcFullGeometry returns all expected fields
{
    const ob = { x: 50, y: 25 }, pocket = { x: 100, y: 25 };
    const cb = { x: 20, y: 30 };
    const g = P.calcFullGeometry(cb, ob, pocket, {
        tipHeight: 0.5, tipSide: -0.3, shotSpeed: 0.6,
        cueElevation: 10, shaftType: 'ld'
    });
    const fields = ['ghostBall', 'cutAngle', 'cutAngleDeg', 'fraction', 'cross',
        'stunDir', 'deflDir', 'deflAngleDeg', 'contactPoint', 'dirPocket', 'dirAim',
        'aimDist', 'pocketDist', 'throwAngle', 'throwAngleDeg', 'dirPocketThrown',
        'squirtAngle', 'squirtAngleDeg', 'dirAimSquirted', 'spin', 'speed',
        'swervePath', 'cbStopPos', 'obStopPos', 'cbBouncePath'];
    let allPresent = true;
    const missing = [];
    fields.forEach(f => {
        if (g[f] == null) { allPresent = false; missing.push(f); }
    });
    assert('All fields present', allPresent, `missing: ${missing.join(', ')}`);
}

// Speed normalization
{
    const slow = P.normToSpeed(0);
    const med = P.normToSpeed(0.5);
    const fast = P.normToSpeed(1);
    assert('Speed: slow < med < fast', slow < med && med < fast,
        `slow=${slow.toFixed(0)} med=${med.toFixed(0)} fast=${fast.toFixed(0)}`);
    assert('Speed soft ≈ 30 in/s', approx(slow, 30, 5), `got ${slow.toFixed(1)}`);
}

// Initial spin calculation
{
    const spin = P.calcInitialSpin(-0.5, 0.3, 100);
    assert('Spin: sidespin present', Math.abs(spin.sidespin) > 0, `got ${spin.sidespin.toFixed(1)}`);
    assert('Spin: topspin present', Math.abs(spin.topspin) > 0, `got ${spin.topspin.toFixed(1)}`);
    assert('Spin: left English → negative sidespin', spin.sidespin < 0, `got ${spin.sidespin.toFixed(1)}`);
    assert('Spin: follow → positive topspin', spin.topspin > 0, `got ${spin.topspin.toFixed(1)}`);
}

// ============================================================
//                      OUTPUT
// ============================================================
const passed = log.filter(l => l.startsWith('✅')).length;
const failed = totalTests - passed;

log.push('');
log.push('═══════════════════════════════');
log.push(`Total: ${totalTests}  |  Passed: ${passed}  |  Failed: ${failed}`);
if (failed === 0) log.push('🎉 ALL TESTS PASSED!');
else log.push('⚠️  SOME TESTS FAILED');

document.getElementById('output').textContent = log.join('\n');
</script>
